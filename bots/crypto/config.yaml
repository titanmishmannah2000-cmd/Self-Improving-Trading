# Crypto bot — BTC/USD + ETH/USD. Strategies are rsi_momentum (trend), not
# FX-style mean_reversion — same discipline as gold (D8).
bot:
  name: crypto
pairs:
  - BTC/USD
  - ETH/USD
goal:
  failure_below: -10.0
  gemini_min_trades: 5
  gemini_reflection: true
  max_drawdown: 10.0
  min_sharpe: 1.0
  one_variable_only: true
  reflection_every: 5
  target_return_30d: 5.0
# GP invent: hourly TF + short horizon (not FX-style daily/h60). Smaller search
# + longer timeout so invent finishes and shows on Discovered. BTC promote stays
# gated by gp_promote_gate / GP_EXCLUDE_PAIRS until shadow expectancy improves.
invent:
  interval: 1h
  period: 60d
  max_candles: 800
  horizon: 12
  generations: 20
  pop_size: 24
  n_islands: 1
  timeout_s: 300
  min_bars: 200
global:
  dashboard_url: ${DASHBOARD_API_URL}
  discord_webhook: ${DISCORD_ALERTS_WEBHOOK}
  fmp_key: ${FMP_KEY}
  llm_keys: {}
